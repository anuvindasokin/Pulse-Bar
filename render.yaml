services:
  - type: web
    name: pulsebar-connect
    runtime: node
    rootDir: cloud
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PUBLIC_BASE_URL
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_GRAPH_VERSION
        value: v23.0
      - key: STATE_SECRET
        generateValue: true
      - key: DATA_ENCRYPTION_KEY
        generateValue: true
      - key: DEVICE_KEYS
        sync: false
      - key: DATA_FILE
        value: /var/data/pulsebar-connect.json
    disk:
      name: pulsebar-data
      mountPath: /var/data
      sizeGB: 1

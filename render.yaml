services:
  - type: web
    name: pulsebar-connect
    runtime: node
    plan: starter
    rootDir: cloud
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PUBLIC_BASE_URL
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_GRAPH_VERSION
        value: v23.0
      - key: STATE_SECRET
        generateValue: true
      - key: DATA_ENCRYPTION_KEY
        generateValue: true
      - key: ADMIN_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: pulsebar-db
          property: connectionString

databases:
  - name: pulsebar-db
    plan: basic-256mb
    databaseName: pulsebar
    user: pulsebar
